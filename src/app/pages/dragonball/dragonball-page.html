<h1>DragonBall Page</h1>
<hr>

<div class="custom-card">
  <section class="row">
    <div class="col-12 col-sm-6">
      <h3>Agregar: {{ name() }} ({{ power() }}) </h3>
      <input type="text" class="form-control mb-2" placeholder="Nombre del personaje" [value]="name()"
        (change)="name.set(txtName.value)" #txtName>
      <input type="number" inputmode="numeric" class="form-control mb-2" placeholder="Poder de pelea" [value]="power()"
        (change)="power.set(txtPower.valueAsNumber)" #txtPower>
      <button class="btn btn-primary" (click)="addCharacter()">Agregar personaje</button>
    </div>
    <div class="col-12 col-sm-6">
      <h3>Personajes:</h3>
      <ul class="list-group">
        @for(character of characters(); track character.id){
        @if(character.power > 500){
        <li class="list-group-item">
          <strong>{{ character.name }}</strong> - Poder de pelea: <strong [class.text-danger]="character.power > 8000"
            [class.text-primary]="character.power <= 8000">{{ character.power }}</strong>
        </li>
        }
        }
      </ul>
    </div>
  </section>
</div>
